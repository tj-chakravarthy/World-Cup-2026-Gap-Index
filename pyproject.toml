[tool.pytest.ini_options]
# -ra surfaces skipped tests + reasons at the end of every run. The mandatory suites
# (Art. 13 tiebreakers, leakage guard, scoreline coherence) are all live and hard-fail in CI
# if a dep is missing (CI=true), so a green CI genuinely means the never-cut contracts ran.
addopts = "-ra --strict-markers"
markers = [
    "mandatory: a never-cut contract (PLAN.md Build Order). Skipped == not enforced (hard-fails in CI).",
]
