name: Update Predictions (live)

# PLAN.md §6. Matches play in North America: kickoffs cluster at 16:00-04:00 UTC, so
# full-times land ~18:00-06:00 UTC. GitHub cron is imprecise (can lag/skip) and the
# results feed lags full-time, so we don't chase the whistle — we POLL every 15 min in
# that window and act only when a new result has landed (run_all is idempotent). Cheap
# `--check` runs on bare python every poll; the heavy recompute (Docker image, faithful
# env) and the commit fire only on a new result. Realistic SLA: live within ~20-40 min
# of full-time. Note: scheduled runs use the DEFAULT branch — this goes live on merge to
# main. Make the repo public so Actions minutes are free.
on:
  workflow_dispatch:
  # PRIMARY trigger: an external cron service (cron-job.org) POSTs the repository_dispatch
  # API every ~15 min in the match window. GitHub's own `schedule:` below is unreliable —
  # it gets throttled/dropped under load and often fires hours apart, so a finished match
  # can sit unscored for hours. Setup (PAT + service config): docs/external_pinger.md.
  repository_dispatch:
    types: [poll-results]
  # BACKSTOP only — kept because it's free and fires occasionally when the pinger is down.
  schedule:
    - cron: "*/15 0-7,17-23 * * *"   # every 15 min, 00:00-07:59 & 17:00-23:59 UTC

concurrency:
  group: update-predictions
  cancel-in-progress: false

permissions:
  contents: write   # the job commits regenerated JSON + the append-only log back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit step can rebase onto a moved main

      # cheap gate: refresh results, exit 10 iff a new result landed (recompute needed).
      - id: check
        name: New result?
        run: |
          pip install -q pandas requests beautifulsoup4 lxml
          set +e
          python -m src.pipeline.run_all --check
          code=$?
          set -e
          if [ "$code" -eq 10 ]; then echo "changed=true"  >> "$GITHUB_OUTPUT";
          elif [ "$code" -eq 0 ]; then echo "changed=false" >> "$GITHUB_OUTPUT";
          else echo "check failed (exit $code)"; exit "$code"; fi

      # the pre-tournament model bundle is fixed for the whole tournament, so cache it
      # across cron runs keyed on the model code — rebuilt only when that code changes,
      # not on every data commit. Runners are ephemeral, so without this each heavy run
      # would rebuild it (~6 min). load_or_build_bundle self-heals if the restore is stale.
      - name: Restore model bundle
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: data/processed/model_bundle.pkl
          key: bundle-v1-${{ hashFiles('src/models/**.py', 'src/features/**.py') }}

      # faithful env (apt trixie base + pip gap, see Dockerfile) — ubuntu-latest isn't
      # trixie, so a bare `pip install -r requirements.txt` would build on the wrong base.
      # Buildx + GHA layer cache: the heavy apt layer keys only on apt-packages.txt +
      # requirements-runtime.txt, so it's restored from cache (~30s) instead of reinstalled
      # (~5 min) every run; only the cheap final COPY re-runs on a code change.
      - name: Set up Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image (cached)
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gapindex:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Recompute forecast + simulation
        if: steps.check.outputs.changed == 'true'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}   # optional; pipeline is keyless today
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          docker run --rm -v "$PWD:/app" -w /app -e API_FOOTBALL_KEY -e ODDS_API_KEY \
            gapindex:latest python3 -m src.pipeline.run_all --force

      - name: Commit refreshed artifacts
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "gapindex-bot"
          git config user.email "gapindex-bot@users.noreply.github.com"
          git add data/raw/fixtures_2026.csv data/predictions web/public/data README.md
          if git diff --cached --quiet; then
            echo "no artifact changes to commit"; exit 0
          fi
          git commit -m "data: live update $(date -u +%FT%TZ)"
          # main can advance mid-run (a human/code push; bot runs serialize via concurrency).
          # Rebase the regenerated commit on top and retry rather than failing the run and
          # dropping the fresh forecast. Conflict policy: the just-regenerated artifacts win
          # (--theirs); README keeps the remote's prose (--ours) and re-stamps its top-board
          # next run — a stale top-board line for one cycle beats losing the update.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push rejected; syncing with origin/main (attempt $attempt)"
            git fetch -q origin main
            if ! git rebase origin/main; then
              git checkout --theirs -- data/raw/fixtures_2026.csv data/predictions web/public/data 2>/dev/null || true
              git checkout --ours   -- README.md 2>/dev/null || true
              git add data/raw/fixtures_2026.csv data/predictions web/public/data README.md
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
            sleep 3
          done
          echo "push failed after 5 attempts"; exit 1
