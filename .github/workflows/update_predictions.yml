name: Update Predictions (daily)

# Scaffold — PLAN.md Phase 6. The daily schedule is intentionally commented out
# until the update pipeline exists; enable it in Stage 6. workflow_dispatch lets
# you trigger a manual run in the meantime.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 8 * * *"   # 08:00 UTC daily

concurrency:
  group: update-predictions
  cancel-in-progress: false

permissions:
  contents: write # the cron commits regenerated JSON back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run update pipeline
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
