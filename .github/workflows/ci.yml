name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Full requirements is heavy (pymc/xgboost/socceraction). Trim to a
      # test-only subset if CI gets slow — see PLAN.md Phase 6.
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall src
      - name: Tests
        run: pytest -q
