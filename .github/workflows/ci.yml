name: CI

on:
  push:
    branches: [main]
  pull_request:

# one run per ref, newer push wins. push only on main so PR branches don't
# get built twice over.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # dev subset only; the heavy stack runs in the image, not in CI
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile check
        run: python -m compileall src
      - name: Tests
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # npm ci needs web/package-lock.json committed (npm install once locally).
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
