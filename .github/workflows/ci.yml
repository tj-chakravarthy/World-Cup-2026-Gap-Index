name: CI

on:
  push:
    branches: [main]
  pull_request:

# one run per ref, newer push wins. push only on main so PR branches don't
# get built twice over.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # dev subset only; the heavy stack runs in the image, not in CI
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile check
        run: python -m compileall src
      - name: Tests
        run: pytest -q

  # web-jobbet borttaget: ingen npm tills frontend-stacken är vald (PLAN §7).
  # Var ett icke-reproducerbart `npm install` utan lockfil. Lägg tillbaka ett
  # bygg-jobb när stacken är bestämd (Stage 5).
