name: CI

on:
  push:
    branches: [main]
  pull_request:

# one run per ref, newer push wins. push only on main so PR branches don't
# get built twice over.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # dev subset only; the heavy stack runs in the image, not in CI
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      # Playwright + Chromium so the web smoke test (tests/test_web_smoke.py) runs here;
      # without a browser it skips, so the rest of CI still works without this step.
      - name: Playwright browser (web smoke test)
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Compile check
        run: python -m compileall src
      - name: Tests
        run: pytest -q

  # inget web-byggjobb: frontend-stacken är vald (Stage 5) som ren statisk site,
  # noll npm/lockfil — web/public serveras som den är. Deploy sköts av
  # deploy-pages.yml; det finns inget att bygga eller testa här.
