name: Deploy site (Pages)

# Static site (web/public): plain HTML/CSS/JS that fetches the cron-published JSON at
# runtime — no build step, no npm. Deploy triggers:
#  - push to web/**            -> site source changed (my commits, SSH push)
#  - after the live cron runs  -> data changed; the cron pushes with GITHUB_TOKEN, which
#    by design does NOT trigger workflows, so we chain off its completion instead
#  - manual
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_run:
    workflows: ["Update Predictions (live)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time. Don't cancel an in-progress deploy — cancelling it mid-publish is what
# raced the cron's rapid redeploys into a failed deploy-pages step. Let it finish; queued runs
# collapse to the latest, so the newest data still wins, it just waits its turn (GitHub's own
# Pages template uses cancel-in-progress: false for exactly this reason).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # for cron-chained runs only deploy a green cron; push/dispatch always deploy
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # whichever attempt published wins; `||` returns the first non-empty page_url
      url: ${{ steps.deploy.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # self-enable Pages via the workflow token; falls back to the
                              # manual Settings -> Pages -> Source = "GitHub Actions" if denied
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/public
      # Pages' backend började pajja 2026-07-02 ~15:00 UTC: deploy-pages returnerar
      # "Deployment failed, try again later." på ca 35-40% av körningarna. Vår deploy-frekvens och
      # site är oförändrade (0% fel dagarna innan, samma rolling-hour-densitet), så det är en
      # Pages-side-flake, inte oss. Felet är en snabb backend-avvisning som ber oss försöka igen, så
      # publicera om upp till tre gånger innan run:et fälls. Alla försök återanvänder samma redan
      # uppladdade artifact; concurrency-gruppen "pages" hindrar överlapp mellan körningar.
      - id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deploy.outcome == 'failure'
        run: sleep 20
      - id: deploy2
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30
      # last attempt: no continue-on-error, so a sustained Pages outage still fails the run honestly
      - id: deploy3
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
