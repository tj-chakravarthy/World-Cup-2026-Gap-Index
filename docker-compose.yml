# Local dev parity: the Python pipeline container (PLAN.md §7.4). The web side is a static
# site (web/public, no npm or build step) served by GitHub Pages, so there's no web service here.
services:
  pipeline:
    build: .
    # keep it alive so `compose up` doesn't just exit; real work goes through
    # `docker compose run pipeline ...`
    command: sleep infinity
    volumes:
      - ./:/app
