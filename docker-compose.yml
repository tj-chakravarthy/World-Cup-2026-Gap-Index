# Local dev parity: python pipeline container (PLAN.md Phase 7.4). The node/npm
# web dev server är parkerad tills frontend-stacken är vald (PLAN §7) — ingen npm
# tills dess. Lägg tillbaka en web-service när stacken är bestämd (Stage 5).
services:
  pipeline:
    build: .
    # keep it alive so `compose up` doesn't just exit; real work goes through
    # `docker compose run pipeline ...`
    command: sleep infinity
    volumes:
      - ./:/app
    # don't blow up a fresh checkout that hasn't copied .env.example over yet
    env_file:
      - path: .env
        required: false
