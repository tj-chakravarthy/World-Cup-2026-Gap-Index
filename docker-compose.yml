# Local dev parity: python pipeline + node web dev server (PLAN.md Phase 7.4).
services:
  pipeline:
    build: .
    # keep it alive so `compose up` doesn't just exit; real work goes through
    # `docker compose run pipeline ...`
    command: sleep infinity
    volumes:
      - ./:/app
    # don't blow up a fresh checkout that hasn't copied .env.example over yet
    env_file:
      - path: .env
        required: false

  web:
    image: node:20-alpine
    working_dir: /app/web
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web
